syntax = "proto3";
package database;

option go_package = "github.com/bruhugo/protobuf_sstable;pb";

enum RecordType {
    RECORD_TYPE_UNKOWN = 0;
    RECORD_TYPE_WRITE = 1;
    RECORD_TYPE_DELETE = 2;
}

message Record {
    string key = 1;
    string value = 2;
    uint64 sequence_number = 3;
    RecordType record_type = 4;
}

message WalRecord {
    Record record = 1;
    uint32 checksum = 2;
}

message SSTableKeyPair {
    map<string, uint64> keyoffset = 1;
}

message SSTableRecord {
    Record record = 1;
    uint32 checksum = 2;
}

message ManifestContent {
    repeated ManifestRecord records = 1;
}

enum ManifestRecordType {
    UNKOWN = 0;
    ADD_SSTABLE = 1;
    REMOVE_SSTABLE = 2;
    LAST_SEQUENCE_NUMBER = 3;
}

message ManifestRecord {
    ManifestRecordType type = 1;
    string filename = 2;            // only used in types 1 and 2
    uint64 sequence = 3;            // only used in type 3
}